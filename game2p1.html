    const drawFunctions = {
      "Superman": drawStars,
      "Avatar": drawParticles,
      "Tron": drawGridLines,
      "Barbie": drawHearts,
      "Dune": drawSand,
      "Matrix": drawMatrix,
      "Star Wars": drawLightSabers,
      "Frozen": drawSnowflakes,
      "Lion King": drawSunrise
    };

    function generateBackgroundGraphics(title, canvas) {
      const ctx = canvas.getContext('2d', { alpha: false });
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      
      const theme = getThemeFromTitle(title);
      
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, theme.color1);
      gradient.addColorStop(0.5, theme.color2);
      gradient.addColorStop(1, theme.color3);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      const drawFn = Object.keys(drawFunctions).find(key => title.includes(key));
      if (drawFn) {
        drawFunctions[drawFn](ctx, canvas, theme);
      } else if (title.includes("Alien") || title.includes("Sci-Fi")) {
        drawAbstractWaves(ctx, canvas, theme);
      } else {
        drawRandomPatterns(ctx, canvas, theme);
      }
    }

    function getThemeFromTitle(title) {
      const themes = {
        "Superman": { color1: "#0052cc", color2: "#1e88e5", color3: "#ffeb3b", accent: "#ffeb3b" },
        "Avatar": { color1: "#1a472a", color2: "#00a86b", color3: "#ffa500", accent: "#00a86b" },
        "Tron": { color1: "#001a33", color2: "#00d4ff", color3: "#ff00ff", accent: "#00d4ff" },
        "Barbie": { color1: "#ff69b4", color2: "#ff1493", color3: "#ffb6c1", accent: "#ff1493" },
        "Dune": { color1: "#8b6914", color2: "#ffd700", color3: "#d4a574", accent: "#ffd700" },
        "Matrix": { color1: "#000000", color2: "#00ff00", color3: "#1a1a1a", accent: "#00ff00" },
        "Star Wars": { color1: "#000000", color2: "#ffeb3b", color3: "#cc0000", accent: "#ffeb3b" },
        "Frozen": { color1: "#00ccff", color2: "#87ceeb", color3: "#e0f2ff", accent: "#00ccff" },
        "Lion King": { color1: "#8b4423", color2: "#ffeb3b", color3: "#ff6600", accent: "#ffeb3b" }
      };
      
      for (const key in themes) {
        if (title.includes(key)) return themes[key];
      }
      return { color1: "#1a1a2e", color2: "#0f3460", color3: "#16c784", accent: "#00d4ff" };
    }

    function drawStars(ctx, canvas, theme) {
      ctx.fillStyle = theme.accent;
      for (let i = 0; i < 50; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const size = Math.random() * 3;
        ctx.fillRect(x, y, size, size);
      }
    }

    function drawParticles(ctx, canvas, theme) {
      for (let i = 0; i < 100; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const r = Math.random() * 20 + 5;
        ctx.fillStyle = `rgba(0, 168, 107, ${Math.random() * 0.5 + 0.2})`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawGridLines(ctx, canvas, theme) {
      ctx.strokeStyle = `rgba(0, 212, 255, 0.3)`;
      ctx.lineWidth = 2;
      const spacing = 40;
      for (let x = 0; x < canvas.width; x += spacing) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += spacing) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawHearts(ctx, canvas, theme) {
      ctx.fillStyle = `rgba(255, 20, 147, 0.4)`;
      for (let i = 0; i < 15; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const size = Math.random() * 30 + 20;
        drawHeart(ctx, x, y, size);
      }
    }

    function drawHeart(ctx, x, y, size) {
      ctx.beginPath();
      ctx.moveTo(x, y + size / 4);
      ctx.bezierCurveTo(x - size / 2, y - size / 4, x - size / 2, y - size / 2, x - size / 4, y - size / 2);
      ctx.bezierCurveTo(x, y - size * 0.8, x + size / 4, y - size / 2, x + size / 2, y - size / 2);
      ctx.bezierCurveTo(x + size / 2, y - size / 4, x, y + size / 4, x, y + size / 4);
      ctx.bezierCurveTo(x, y + size / 4, x, y + size / 2, x - size / 4, y + size / 2);
      ctx.bezierCurveTo(x - size / 3, y + size / 2, x - size / 2, y + size / 3, x - size / 2, y);
      ctx.closePath();
      ctx.fill();
    }

    function drawSand(ctx, canvas, theme) {
      for (let i = 0; i < 200; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const size = Math.random() * 2;
        ctx.fillStyle = `rgba(212, 165, 116, ${Math.random() * 0.5})`;
        ctx.fillRect(x, y, size, size);
      }
    }

    function drawMatrix(ctx, canvas, theme) {
      ctx.fillStyle = `rgba(0, 255, 0, 0.1)`;
      ctx.font = "20px Orbitron";
      const chars = "01アイウエオカキクケコサシスセソ";
      for (let i = 0; i < 50; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        ctx.fillText(chars[Math.floor(Math.random() * chars.length)], x, y);
      }
    }

    function drawLightSabers(ctx, canvas, theme) {
      for (let i = 0; i < 5; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const angle = Math.random() * Math.PI * 2;
        ctx.strokeStyle = i % 2 === 0 ? "#ffeb3b" : "#cc0000";
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(angle) * 80, y + Math.sin(angle) * 80);
        ctx.stroke();
      }
    }

    function drawSnowflakes(ctx, canvas, theme) {
      ctx.strokeStyle = `rgba(0, 204, 255, 0.6)`;
      ctx.lineWidth = 2;
      for (let i = 0; i < 30; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        drawSnowflake(ctx, x, y, Math.random() * 15 + 10);
      }
    }

    function drawSnowflake(ctx, x, y, size) {
      for (let i = 0; i < 6; i++) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate((i * Math.PI) / 3);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, size);
        ctx.stroke();
        for (let j = 1; j < 3; j++) {
          ctx.beginPath();
          ctx.moveTo(0, (size / 3) * j);
          ctx.lineTo((size / 3) * (0.5 * j), (size / 3) * j + (size / 3) * 0.5);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    function drawSunrise(ctx, canvas, theme) {
      const sunY = canvas.height * 0.6;
      const gradient = ctx.createRadialGradient(canvas.width / 2, sunY, 0, canvas.width / 2, sunY, 150);
      gradient.addColorStop(0, `rgba(255, 235, 59, 0.8)`);
      gradient.addColorStop(1, `rgba(255, 102, 0, 0.3)`);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(canvas.width / 2, sunY, 150, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawAbstractWaves(ctx, canvas, theme) {
      ctx.strokeStyle = `rgba(0, 212, 255, 0.3)`;
      ctx.lineWidth = 3;
      for (let wave = 0; wave < 5; wave++) {
        ctx.beginPath();
        for (let x = 0; x <= canvas.width; x += 10) {
          const y = canvas.height / 2 + Math.sin((x + wave * 50) * 0.01) * 50 + wave * 30;
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    function drawRandomPatterns(ctx, canvas, theme) {
      for (let i = 0; i < 80; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const size = Math.random() * 4;
        ctx.fillStyle = `rgba(0, 212, 255, ${Math.random() * 0.4})`;
        ctx.fillRect(x, y, size, size);
      }
    }

      "Pirates of the Caribbean": "https://image.tmdb.org/t/p/w500/j6yT1W4N3n1o7x9d9P5P7v0x2O8.jpg",
      "Shrek": "https://image.tmdb.org/t/p/w500/51sVwO05l1Kz5l5P8L5x5L8x5L8.jpg",
      "Batman": "https://image.tmdb.org/t/p/w500/1hQZz51P6yQv6P5w7P6yQv6P5w7.jpg",
      "Barbie": "https://image.tmdb.org/t/p/w500/iuFNMS4UoU3dK7W9g7d5U6P8P9x.jpg",
      "Men in Black": "https://image.tmdb.org/t/p/w500/m5z7d5U6P8P9x3oPz3V1z1m7tK7.jpg",
      "Mission: Impossible": "https://image.tmdb.org/t/p/w500/5k7d5U6P8P9x3oPz3V1z1m7tK7W.jpg",
      "Inception": "https://image.tmdb.org/t/p/w500/edvUpQYQG26867lPz5L8x5L8x5L.jpg"
    };

    let shuffledIndices = [];

    function generate() {
      if (shuffledIndices.length === 0) {
        shuffledIndices = [...Array(movieData.length).keys()].sort(() => Math.random() - 0.5);
      }
      const idx = shuffledIndices.pop();
      const el = document.getElementById('result');
      const canvas = document.getElementById('bgCanvas');
      
      const fullTitle = movieData[idx].title;
      const [title, scene] = fullTitle.split(':');
      
      el.innerHTML = `
        <div style="font-weight: 900; font-size: 24px; color: #fff; margin-bottom: 8px; text-transform: uppercase; word-wrap: break-word;">${title}</div>
        <div style="font-weight: 400; font-size: 16px; color: #00d4ff; line-height: 1.3; opacity: 0.9; word-wrap: break-word;">${scene || ''}</div>
      `;
      
      const posterKey = Object.keys(moviePosters).find(key => title.includes(key));
      if (posterKey) {
        document.getElementById('app').style.backgroundImage = `url(${moviePosters[posterKey]})`;
        document.getElementById('app').style.backgroundSize = "cover";
        document.getElementById('app').style.backgroundPosition = "center";
        canvas.style.opacity = "0.2";
      } else {
        document.getElementById('app').style.backgroundImage = "none";
        canvas.style.opacity = "0.6";
      }
      
      generateBackgroundGraphics(title, canvas);
      el.classList.remove('title-reveal');
      void el.offsetWidth;
      el.classList.add('title-reveal');
    }

    const defaultConfig = { button_text: "GENERATE", primary_color: "#00d4ff", font_family: "Orbitron", font_size: 28 };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const btn = document.getElementById('genBtn');
        const result = document.getElementById('result');
        btn.textContent = config.button_text || defaultConfig.button_text;
        const c = config.primary_color || defaultConfig.primary_color;
        result.style.color = c;
        result.style.textShadow = `0 0 8px ${c}, 0 0 20px ${c}88, 0 0 40px ${c}44`;
        btn.style.background = `linear-gradient(135deg, ${c}, #0066ff)`;
        btn.style.boxShadow = `0 0 20px ${c}66, 0 4px 15px rgba(0,0,0,0.3)`;
        const font = config.font_family || defaultConfig.font_family;
        result.style.fontFamily = `${font}, sans-serif`;
        btn.style.fontFamily = `${font}, sans-serif`;
        const size = config.font_size || defaultConfig.font_size;
        result.style.fontSize = `${size}px`;
        btn.style.fontSize = `${size * 0.75}px`;
      },
      mapToCapabilities: (config) => ({
        recolorables: [{
          get: () => config.primary_color || defaultConfig.primary_color,
          set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }
        }],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ["button_text", config.button_text || defaultConfig.button_text]
      ])
    });
